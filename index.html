<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Sissors</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>

    <h3>Rock Paper Sissors</h3>

    <button class="btn" onclick="playGame('✊')" title="Rock">✊</button>
    <button class="btn" onclick="playGame('✋')" title="Paper">✋</button>
    <button class="btn" onclick="playGame('✌️')" title="Sissors">✌️</button>

    <br>
    <p id="result"></p>
    <p id="moves"></p>
    <p id="score"></p>

    <button class="resetButton" onclick="resetScore()" title="Reset Your Score">Reset Score</button >

</body>
</html>
