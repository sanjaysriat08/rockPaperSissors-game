<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Sissors</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>

    <p>Rock Paper Sissors</p>

    <button onclick="playGame('✊')" title="Rock">✊</button>
    <button onclick="playGame('✋')" title="Paper">✋</button>
    <button onclick="playGame('✌️')" title="Sissors">✌️</button>

    <br>
    <p id="result"></p>
    <p id="moves"></p>
    <p id="score"></p>

    <button onclick="resetScore()" title="Reset Your Score"><img src="reset.png" alt="reset-btn" width='15px'></button >

</body>
</html>
